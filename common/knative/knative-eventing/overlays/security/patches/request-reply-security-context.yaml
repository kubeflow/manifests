apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: request-reply
  namespace: knative-eventing
spec:
  template:
    spec:
      containers:
        - name: request-reply
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
