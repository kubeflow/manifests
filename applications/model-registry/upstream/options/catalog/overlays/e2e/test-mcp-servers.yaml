# MCP server test data for E2E tests
# Contains servers for: listing, retrieval, tools, custom properties,
# remote endpoints, and deployment modes
source: Test MCP Servers
mcp_servers:
  - name: weather-api
    description: "Community weather API MCP server"
    provider: "Weather Community"
    version: "1.0.0"
    license: "MIT"
    deploymentMode: local
    transports:
      - stdio
    tags:
      - weather
      - api
      - community
    tools:
      - name: get_current_weather
        description: "Get current weather for a location"
      - name: get_forecast
        description: "Get weather forecast"
    createTimeSinceEpoch: "1736510400000"
    lastUpdateTimeSinceEpoch: "1736510400000"

  - name: file-manager
    description: "File system management MCP server"
    provider: "Community Dev"
    version: "0.9.2"
    license: "BSD-3-Clause"
    tags:
      - filesystem
      - files
      - management
    tools:
      - name: read_file
        description: "Read file contents"
      - name: write_file
        description: "Write to files"
      - name: list_directory
        description: "List directory contents"
    createTimeSinceEpoch: "1738300800000"
    lastUpdateTimeSinceEpoch: "1739510400000"

  - name: calculator
    description: "Mathematical calculator MCP server"
    provider: "Math Community"
    version: "2.0.0"
    license: "MIT"
    tags:
      - math
      - calculator
      - computation
    securityIndicators:
      verifiedSource: true
      sast: true
      readOnlyTools: true
    customProperties:
      observability:
        metadataType: MetadataStringValue
        string_value: ""
    tools:
      - name: calculate
        description: "Perform mathematical calculations"
      - name: solve_equation
        description: "Solve mathematical equations"
    createTimeSinceEpoch: "1740091200000"
    lastUpdateTimeSinceEpoch: "1740091200000"

  - name: remote-http-server
    description: "Remote MCP server accessed via HTTP endpoint"
    provider: "CloudMCP"
    version: "1.0.0"
    license: "Apache-2.0"
    deploymentMode: remote
    transports:
      - http
    endpoints:
      http: https://mcp.cloudprovider.com/api
    tags:
      - remote
      - http
      - cloud
    tools:
      - name: cloud_query
        description: "Query cloud resources"
    createTimeSinceEpoch: "1740177600000"
    lastUpdateTimeSinceEpoch: "1740177600000"

  - name: remote-sse-server
    description: "Remote MCP server accessed via SSE endpoint"
    provider: "StreamCorp"
    version: "2.1.0"
    license: "MIT"
    deploymentMode: remote
    transports:
      - sse
    endpoints:
      sse: https://stream.example.com/mcp/events
    tags:
      - remote
      - sse
      - streaming
    tools:
      - name: subscribe_events
        description: "Subscribe to real-time events"
      - name: stream_data
        description: "Stream data from source"
    createTimeSinceEpoch: "1740264000000"
    lastUpdateTimeSinceEpoch: "1740264000000"

  - name: hybrid-server
    description: "Hybrid server with local deployment and remote HTTP endpoint"
    provider: "HybridCorp"
    version: "3.0.0"
    license: "MIT"
    deploymentMode: local
    transports:
      - stdio
      - http
    endpoints:
      http: https://api.hybridcorp.com/mcp
    artifacts:
      - uri: oci://ghcr.io/hybridcorp/hybrid-mcp:3.0.0
    tags:
      - hybrid
      - local
      - remote
    tools:
      - name: process_data
        description: "Process data locally or remotely"
    createTimeSinceEpoch: "1740350400000"
    lastUpdateTimeSinceEpoch: "1740350400000"
