apiVersion: v1
kind: Service
metadata:
  name: dex
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      # ClientIP affinity uses the source IP seen by this Service.
      # In practice that is typically an in-cluster ingress or proxy pod IP,
      # not the original end-user IP. Keep the timeout bounded so a single
      # authentication flow stays sticky without creating long-lived skew.
      timeoutSeconds: 60
  ports:
  - name: dex
    port: 5556
    protocol: TCP
    targetPort: 5556
  selector:
    app: dex
