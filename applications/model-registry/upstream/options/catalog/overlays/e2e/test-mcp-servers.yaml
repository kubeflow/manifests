# MCP server test data for E2E tests
# Contains servers for: listing, retrieval, tools, custom properties
source: Test MCP Servers
mcp_servers:
  - name: weather-api
    description: "Community weather API MCP server"
    provider: "Weather Community"
    version: "1.0.0"
    license: "MIT"
    tags:
      - weather
      - api
      - community
    tools:
      - name: get_current_weather
        description: "Get current weather for a location"
      - name: get_forecast
        description: "Get weather forecast"
    createTimeSinceEpoch: "1736510400000"
    lastUpdateTimeSinceEpoch: "1736510400000"

  - name: file-manager
    description: "File system management MCP server"
    provider: "Community Dev"
    version: "0.9.2"
    license: "BSD-3-Clause"
    tags:
      - filesystem
      - files
      - management
    tools:
      - name: read_file
        description: "Read file contents"
      - name: write_file
        description: "Write to files"
      - name: list_directory
        description: "List directory contents"
    createTimeSinceEpoch: "1738300800000"
    lastUpdateTimeSinceEpoch: "1739510400000"

  - name: calculator
    description: "Mathematical calculator MCP server"
    provider: "Math Community"
    version: "2.0.0"
    license: "MIT"
    tags:
      - math
      - calculator
      - computation
    customProperties:
      verifiedSource:
        metadataType: MetadataBoolValue
        bool_value: true
      sast:
        metadataType: MetadataBoolValue
        bool_value: true
      readOnlyTools:
        metadataType: MetadataBoolValue
        bool_value: true
      observability:
        metadataType: MetadataStringValue
        string_value: ""
    tools:
      - name: calculate
        description: "Perform mathematical calculations"
      - name: solve_equation
        description: "Solve mathematical equations"
    createTimeSinceEpoch: "1740091200000"
    lastUpdateTimeSinceEpoch: "1740091200000"
