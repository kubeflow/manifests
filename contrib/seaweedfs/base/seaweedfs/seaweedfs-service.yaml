apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: kubeflow
spec:
  ports:
  - name: http
    port: 9000
    protocol: TCP
    targetPort: 8333
  - name: iam
    port: 8111
    protocol: TCP
    targetPort: 8111
  - name: master
    port: 9333
    protocol: TCP
    targetPort: 9333
  - name: master-grcp
    port: 19333
    protocol: TCP
    targetPort: 19333
  - name: filer
    port: 8888
    protocol: TCP
    targetPort: 8888
  selector:
    app: seaweedfs
