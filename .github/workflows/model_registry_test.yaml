# If anyone changes or improve the following tests for Model Registry, please
# consider reflecting the same changes on https://github.com/kubeflow/model-registry
name: Test Model Registry
on:
  pull_request:
    paths:
    - tests/install_KinD_create_KinD_cluster_install_kustomize.sh
    - .github/workflows/model_registry_test.yaml
    - .github/actions/setup-kubeflow-base/**
    - applications/model-registry/upstream/**
    - tests/istio*
    - tests/model_registry_test/**
    - common/istio*/**

permissions:
  contents: read
  actions: read

jobs:
  build-kfmr:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Kubeflow Base
      uses: ./.github/actions/setup-kubeflow-base

    - name: Install Model Registry
      run: ./tests/model_registry_test/install.sh

    - name: Run Model Registry tests
      run: ./tests/model_registry_test/test.sh
