apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jobset-webhook
  namespace: kubeflow-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jobset
      control-plane: controller-manager
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 9443
