---
source: Community and custom
mcp_servers:
  - name: prometheus-mcp
    provider: pab1it0
    license: apache-2.0
    license_link: https://www.apache.org/licenses/LICENSE-2.0
    description: >-
      Query Prometheus metrics and alerts directly from your agent.
      Provides PromQL query execution, alert retrieval, and metric discovery.
    readme: |-
      # Prometheus MCP Server

      **MCP Server Summary:**
      Access Prometheus metrics and alerting data through the MCP protocol.

      ## Features
      - Execute PromQL queries
      - Query range data
      - Retrieve active alerts

      ## Prerequisites
      - Prometheus server access
      - Network connectivity to Prometheus API
    version: "1.5.1"
    transports:
      - http
    logo: data:image/svg+xml;base64,
    repositoryUrl: https://github.com/pab1it0/prometheus-mcp-server
    sourceCode: pab1it0/prometheus-mcp-server
    publishedDate: "2025-01-10T00:00:00Z"
    tools:
      - name: query
        description: Execute PromQL queries
        accessType: read_only
        parameters:
          - name: query
            type: string
            description: PromQL query expression
            required: true
      - name: query_range
        description: Execute PromQL range queries
        accessType: read_only
        parameters:
          - name: query
            type: string
            description: PromQL query expression
            required: true
          - name: start
            type: string
            description: Start timestamp
            required: true
          - name: end
            type: string
            description: End timestamp
            required: true
      - name: get_alerts
        description: Retrieve active alerts
        accessType: read_only
        parameters: []
    artifacts:
      - uri: oci://ghcr.io/pab1it0/prometheus-mcp-server:v1.5.1
        createTimeSinceEpoch: "1736510400000"
        lastUpdateTimeSinceEpoch: "1736510400000"
    securityIndicators:
      verifiedSource: true
      secureEndpoint: true
      sast: false
      readOnlyTools: true
    customProperties:
      metrics:
        metadataType: MetadataStringValue
        string_value: ""
      monitoring:
        metadataType: MetadataStringValue
        string_value: ""
      alerting:
        metadataType: MetadataStringValue
        string_value: ""
    createTimeSinceEpoch: "1736510400000"
    lastUpdateTimeSinceEpoch: "1736510400000"

  - name: kubernetes-mcp
    provider: containers
    license: apache-2.0
    license_link: https://www.apache.org/licenses/LICENSE-2.0
    description: >-
      Interact with Kubernetes clusters through natural language.
      List pods, check deployments, view logs, and manage resources.
    readme: |-
      # Kubernetes MCP Server

      **MCP Server Summary:**
      Comprehensive Kubernetes cluster management through MCP.

      ## Features
      - Pod management and listing
      - Deployment operations
      - Log retrieval
      - Scaling operations

      ## Prerequisites
      - kubectl configured with cluster access
      - Appropriate RBAC permissions
    version: "0.0.59"
    transports:
      - stdio
    logo: data:image/svg+xml;base64,
    repositoryUrl: https://github.com/containers/kubernetes-mcp-server
    sourceCode: containers/kubernetes-mcp-server
    publishedDate: "2025-01-12T00:00:00Z"
    tools:
      - name: get_pods
        description: List pods in a namespace
        accessType: read_only
        parameters:
          - name: namespace
            type: string
            description: Kubernetes namespace
            required: true
      - name: get_deployments
        description: List deployments
        accessType: read_only
        parameters:
          - name: namespace
            type: string
            description: Kubernetes namespace
            required: true
      - name: get_logs
        description: Retrieve pod logs
        accessType: read_only
        parameters:
          - name: namespace
            type: string
            description: Kubernetes namespace
            required: true
          - name: pod_name
            type: string
            description: Name of the pod
            required: true
      - name: scale_deployment
        description: Scale a deployment
        accessType: read_write
        parameters:
          - name: namespace
            type: string
            description: Kubernetes namespace
            required: true
          - name: deployment_name
            type: string
            description: Name of the deployment
            required: true
          - name: replicas
            type: number
            description: Desired number of replicas
            required: true
    artifacts:
      - uri: oci://quay.io/containers/kubernetes_mcp_server:v0.0.59
        createTimeSinceEpoch: "1736683200000"
        lastUpdateTimeSinceEpoch: "1736683200000"
    securityIndicators:
      verifiedSource: true
      secureEndpoint: true
      sast: true
      readOnlyTools: false
    customProperties:
      kubernetes:
        metadataType: MetadataStringValue
        string_value: ""
      containers:
        metadataType: MetadataStringValue
        string_value: ""
      orchestration:
        metadataType: MetadataStringValue
        string_value: ""
    createTimeSinceEpoch: "1736683200000"
    lastUpdateTimeSinceEpoch: "1736683200000"

