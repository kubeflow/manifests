name: Test KServe
on:
  pull_request:
    paths:
    - tests/install_KinD_create_KinD_cluster_install_kustomize.sh
    - .github/workflows/kserve_test.yaml
    - applications/kserve/**
    - apps/kserve/**
    - tests/kserve*
    - tests/kserve_test.sh
    - tests/kserve_install.sh
    - common/istio*/**
    - common/oauth2-proxy/**
    - tests/oauth2-proxy_install.sh
    - common/cert-manager/**
    - tests/istio*
    - common/knative/**
    - tests/knative_install.sh

permissions:
  contents: read
  actions: read

jobs:
  kserve_test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install KinD, Create KinD cluster and Install kustomize
      run: ./tests/install_KinD_create_KinD_cluster_install_kustomize.sh

    - name: Create kubeflow namespace
      run: kustomize build common/kubeflow-namespace/base | kubectl apply -f -

    - name: Install Istio CNI
      run: ./tests/istio-cni_install.sh

    - name: Install oauth2-proxy
      run: ./tests/oauth2-proxy_install.sh

    - name: Install cert-manager
      run: ./tests/cert_manager_install.sh

    - name: Install knative CNI
      run: ./tests/knative_install.sh

    - name: Install KServe
      run: ./tests/kserve_install.sh

    - name: Install KF Multi Tenancy
      run: ./tests/multi_tenancy_install.sh

    - name: Install kubeflow-istio-resources
      run: kustomize build common/istio/kubeflow-istio-resources/base | kubectl apply -f -

    - name: Create KF Profile
      run: ./tests/kubeflow_profile_install.sh

    - name: Setup python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Port forward
      run: ./tests/port_forward_gateway.sh

    - name: Wait for Istio configurations to propagate
      run: |
        kubectl wait --for=condition=Available --timeout=120s deployment/cluster-local-gateway -n istio-system
        sleep 60

    - name: Run KServe tests
      run: ./tests/kserve_test.sh kubeflow-user-example-com

    - name: Apply Pod Security Standards restricted levels
      run: ./tests/PSS_enable.sh

    - name: Collect Logs on Failure
      if: failure() || cancelled()
      run: |
        mkdir -p logs
        kubectl get all --all-namespaces > logs/resources.txt
        kubectl get events --all-namespaces --sort-by=.metadata.creationTimestamp > logs/events.txt
        for namespace in kubeflow kubeflow-system istio-system cert-manager auth kubeflow-user-example-com; do
            kubectl describe pods -n $namespace > logs/$namespace-pods.txt
            for pod in $(kubectl get pods -n $namespace -o jsonpath='{.items[*].metadata.name}'); do
                kubectl logs -n $namespace $pod --tail=100 > logs/$namespace-$pod.txt 2>&1 || true
            done
        done

    - name: Upload Diagnostic Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kserve-test-logs
        path: logs/
