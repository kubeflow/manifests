# TODO(https://github.com/kubeflow/manifests/issues/774):
# This is a legacy package. Hopefully we can get rid of it once
# 774 is complete.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# TODO(jlewi): We can't depend on base because of the deployment_patch.
# but maybe if we changed that to use ConfigMapRef then the patch would correctly
# override the patch applied in base_v3
resources:
- cluster-role-binding.yaml
- cluster-role.yaml
- deployment.yaml
- role-binding.yaml
- role.yaml
- service-account.yaml
- service.yaml
- configs/logos-configmap.yaml
namePrefix: jupyter-web-app-
namespace: kubeflow
images:
- name: ghcr.io/kubeflow/kubeflow/jupyter-web-app
  newName: ghcr.io/kubeflow/kubeflow/jupyter-web-app
  newTag: v1.10.0
# We need the name to be unique without the suffix because the original name is what
# gets used with patches
configMapGenerator:
- envs:
  - params.env
  name: parameters
- files:
  - configs/spawner_ui_config.yaml
  name: config
replacements:
- source:
    fieldPath: data.JWA_USERID_HEADER
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.2.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.JWA_USERID_PREFIX
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.3.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.JWA_UI
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.1.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.JWA_PREFIX
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.0.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.JWA_APP_SECURE_COOKIES
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.4.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.JWA_APP_ENABLE_METRICS
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.5.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
labels:
- includeSelectors: true
  pairs:
    app: jupyter-web-app
    kustomize.component: jupyter-web-app
