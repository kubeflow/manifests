name: ARM64/AArch64 Image Validation

on:
  push:
    branches:
    - master

  pull_request:
    paths:
    - "example/**"
    - "common/**"
    - "tests/**"

permissions:
  contents: read
  actions: read

jobs:
  arm64-image-validation:
    if: ${{ github.repository == 'kubeflow/manifests' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install kustomize
      run: |
        bash tests/kustomize_install.sh
        kustomize version

    - name: Validate images support linux/arm64
      shell: bash
      run: |
        set -euxo pipefail

        sudo apt-get update
        sudo apt-get install -y skopeo jq

        kustomize build example > /tmp/kubeflow.yaml

        grep -E '^[[:space:]]*image:[[:space:]]*' /tmp/kubeflow.yaml \
          | sed -E 's/^[[:space:]]*image:[[:space:]]*//' \
          | sed -E 's/[[:space:]]+$//' \
          | sort -u \
          > /tmp/kubeflow-images.txt

        test -s /tmp/kubeflow-images.txt

        # Filter out non-image placeholders/templates/vars.
        grep -v -E '^\{\{|\}\}$|^\$' /tmp/kubeflow-images.txt > /tmp/kubeflow-images.filtered.txt || true

        # Allowlist: Specific upstream-known images that lack linux/arm64 support.
        # These images are filtered out from validation to avoid blocking PRs.
        grep -v -E '^ghcr\.io/kubeflow/trainer/mlx-runtime:v2\.2\.0$|^kserve/huggingfaceserver:v0\.16\.0(-gpu)?$' \
          /tmp/kubeflow-images.filtered.txt > /tmp/kubeflow-images.final.txt || true

        missing=0
        while IFS= read -r image; do
          [ -z "${image}" ] && continue
          echo "Checking ${image}"

          raw="$(skopeo inspect --raw "docker://${image}" 2>/dev/null || true)"
          if [ -z "${raw}" ]; then
            echo "WARNING: cannot inspect ${image} (registry/auth/rate-limit error). Skipping."
            continue
          fi

          if echo "${raw}" | jq -e '.manifests' >/dev/null 2>&1; then
            if echo "${raw}" | jq -e '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64")' >/dev/null; then
              echo "OK: ${image} supports linux/arm64"
            else
              echo "FAIL: ${image} does not currently support ARM64."
              missing=$((missing+1))
            fi
          else
            echo "WARNING: ${image} is not a manifest list; cannot confirm ARM64 support from metadata."
          fi
        done < /tmp/kubeflow-images.final.txt

        if [ "${missing}" -gt 0 ]; then
          echo "ERROR: ${missing} images do not advertise linux/arm64 (allowlist applied from filtering step)."
          exit 1
        fi

        echo "SUCCESS: All validated images support linux/arm64."
