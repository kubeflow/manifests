apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "katib.config.configMapName" . }}
  namespace: {{ include "katib.namespace" . }}
  {{- if not .Values.global.kustomizeMode.omitComponentLabels }}
  labels:
    {{- include "katib.labels" . | nindent 4 }}
  {{- end }}
data:
  katib-config.yaml: |
{{- if .Values.config.katibConfig }}
{{ .Values.config.katibConfig | indent 4 }}
{{- else }}
    apiVersion: config.kubeflow.org/v1beta1
    kind: KatibConfig
    init:
{{- if .Values.config.certGenerator.enabled }}
      certGenerator:
        enable: true
{{- end }}
      controller:
        webhookPort: {{ .Values.controller.ports.webhook }}
        trialResources:
{{- range .Values.config.trialResources }}
          - {{ . }}
{{- end }}
    runtime:
{{ .Values.config.runtimeConfig | indent 6 }}
{{- end }}
