apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- cluster-role-binding.yaml
- cluster-role.yaml
- deployment.yaml
- service-account.yaml
- service.yaml
namePrefix: volumes-web-app-
namespace: kubeflow
images:
- name: ghcr.io/kubeflow/kubeflow/volumes-web-app
  newName: ghcr.io/kubeflow/kubeflow/volumes-web-app
  newTag: v1.10.0
# We need the name to be unique without the suffix because the original name is what
# gets used with patches
configMapGenerator:
- envs:
  - params.env
  name: parameters
- files:
  - viewer-spec.yaml
  name: viewer-spec
labels:
- includeSelectors: true
  pairs:
    app: volumes-web-app
    kustomize.component: volumes-web-app
replacements:
- source:
    fieldPath: data.VWA_USERID_HEADER
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.1.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.VWA_USERID_PREFIX
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.2.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.VWA_PREFIX
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.0.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.VWA_APP_SECURE_COOKIES
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.3.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1
- source:
    fieldPath: data.VWA_APP_ENABLE_METRICS
    kind: ConfigMap
    name: parameters
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.0.env.5.value
    select:
      group: apps
      kind: Deployment
      name: deployment
      version: v1