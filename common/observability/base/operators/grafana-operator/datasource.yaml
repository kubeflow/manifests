apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-datasource
  namespace: kubeflow-monitoring-system
spec:
  datasource:
    name: prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-operated.kubeflow-monitoring-system.svc:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 5s
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
