apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubeflow

resources:
  ## see the 'kubeflow' overlay for more configuration options
  - ../kubeflow

configMapGenerator:
  - name: profiles-namespace-labels-data
    behavior: replace
    files:
      - namespace-labels.yaml=namespace-labels-kubeflow-pss.yaml