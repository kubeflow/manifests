# Upstream is https://github.com/dexidp/dex/blob/master/examples/k8s/dex.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: auth

resources:
- namespace.yaml
- config-map.yaml
- upstream/crds.yaml
- rbac.yaml
- serviceaccount.yaml
- deployment.yaml
- service.yaml
- dex-passwords.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
- name: dex-oidc-client
  type: Opaque
  envs:
  - secret_params.env
