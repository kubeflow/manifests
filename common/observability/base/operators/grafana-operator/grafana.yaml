apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: kubeflow-monitoring-system
  labels:
    dashboards: "grafana"
spec:
  config:
    auth:
      disable_login_form: "false"
    users:
      allow_sign_up: "false"
  deployment:
    spec:
      template:
        spec:
          containers:
          - name: grafana
            image: grafana/grafana:10.2.3
