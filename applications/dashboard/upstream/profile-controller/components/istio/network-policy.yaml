apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: profiles-kfam
spec:
  podSelector:
    matchLabels:
      app: profile-controller
      app.kubernetes.io/component: controller-manager
  ingress:
    - ports:
        - protocol: TCP
          port: http-kfam
      from:
        ## allow traffic from istio namespace, which is where the istio ingress gateway pods typically run
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - istio-system
        ## allow traffic from kubeflow namespace, which is where the dashboard pods run, and which need to reach the kfam service
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - kubeflow
  policyTypes:
    - Ingress
